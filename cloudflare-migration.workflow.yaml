    - step: 6
      action: "parse XML into transcript segments"
      detail: |
        // regex parse: /<text start="([\d.]+)" dur="([\d.]+)"[^>]*>(.*?)<\/text>/g
        // decode HTML entities in text: &amp; → &, &#39; → ', etc.
        // return [{ text, start: parseFloat(start), duration: parseFloat(dur) }]

why_cloudflare_works:
  ip_reputation: "Cloudflare Workers run on 300+ edge nodes worldwide; their IPs are shared with millions of legitimate websites, not flagged as datacenter bots"
  fetch_api: "Workers use standard fetch() — requests look like normal browser traffic from Cloudflare's edge"
  no_subprocess: "no yt-dlp, no Python, no shelling out — pure JS fetch + parse"
  youtube_perspective: "sees a request from a Cloudflare edge IP with browser-like headers — same as any CDN-proxied user"

risks:
  - id: r1
    risk: "YouTube changes HTML structure (ytInitialPlayerResponse renamed or removed)"
    likelihood: low
    mitigation: "multiple regex fallbacks; same risk youtube-transcript-api has; monitor and update"

  - id: r2
    risk: "Cloudflare edge IPs eventually get flagged too"
    likelihood: very_low
    mitigation: "Cloudflare IPs serve billions of requests; blocking them would break the internet"

  - id: r3
    risk: "age-restricted videos require login/consent cookies"
    likelihood: medium
    mitigation: "return clear 403 error; document limitation; can add cookie support later via Worker env secrets"

  - id: r4
    risk: "Worker free tier limit (100k requests/day) exceeded"
    likelihood: low_unless_viral
    mitigation: "Workers paid plan is $5/mo for 10M requests; add basic caching via Cache API"

  - id: r5
    risk: "CRA build quirks with Cloudflare Pages"
    likelihood: low
    mitigation: "CRA outputs standard static files; Pages handles them natively"

gotchas:
  - "Worker fetch to YouTube must include User-Agent header or YouTube may return minimal HTML"
  - "YouTube transcript XML uses HTML entities — must decode &amp; &#39; &quot; etc."
  - "some videos have ytInitialPlayerResponse in a script tag, others use ytcfg.set — handle both"
  - "baseUrl in captionTracks may be protocol-relative (//...) — prepend https: if needed"
  - "CORS: Worker must return Access-Control-Allow-Origin for the Pages domain"
  - "Cloudflare Pages env vars for CRA must be prefixed with REACT_APP_ (CRA requirement, not Cloudflare)"

config:
  cloudflare_account_id: "$CLOUDFLARE_ACCOUNT_ID"
  worker_name: "ytran-api"
  pages_project: "ytran"
  custom_domain: "optional"
  env_vars:
    REACT_APP_BACKEND_URL: "https://ytran-api.<subdomain>.workers.dev (or empty if same domain)"
