# cloudflare-migration.workflow.yaml
# Option 6: static React on CF Pages + CF Worker transcript proxy
# Replaces: Railway FastAPI + Python + MongoDB (YouTube-blocked datacenter IPs)
# Result: $0/mo, edge IPs not flagged, no Python, no yt-dlp, no MongoDB

meta:
  id: cf-migration
  version: "1.0"
  created: "2026-04-03"
  skeleton: skeleton_pipeline
  repo: vd7-claude/ytran
  arch:
    before: { fe: "React/Railway", be: "FastAPI/Railway", db: "MongoDB", problem: "IP-blocked by YouTube" }
    after: { fe: "React/CF Pages", be: "CF Worker (Hono/TS)", db: "none", cost: "$0" }

pipeline:
  - id: scaffold-worker
    action: "create worker/ project"
    cmd: "write worker/package.json, worker/wrangler.toml, worker/tsconfig.json"
    output: ["worker/package.json", "worker/wrangler.toml", "worker/tsconfig.json"]

  - id: transcript-engine
    action: "write worker/src/transcript.ts — YouTube transcript extraction via fetch+parse"
    logic: |
      1. fetch(youtube.com/watch?v=ID) with browser UA
      2. regex extract ytInitialPlayerResponse JSON from HTML
      3. parse captions.playerCaptionsTracklistRenderer.captionTracks[]
      4. select track by lang (prefer manual > auto-generated)
      5. fetch(track.baseUrl) → XML <text start="" dur="">...</text>
      6. regex-parse XML → [{text, start, duration}]
    output: ["worker/src/transcript.ts"]
    verification: "fetchTranscript('dQw4w9WgXcQ') returns >0 segments"

  - id: worker-api
    action: "write worker/src/index.ts — Hono routes matching current frontend contract"
    routes:
      - { method: POST, path: "/api/transcript", body: "{url, language?}", returns: "TranscriptResponse" }
      - { method: GET, path: "/api/languages/:videoId", returns: "LanguagesResponse" }
      - { method: GET, path: "/api/", returns: "{message, backend}" }
    cors: ["https://ytran.pages.dev", "http://localhost:3000"]
    output: ["worker/src/index.ts"]

  - id: frontend-adapt
    action: "update frontend/src/lib/api.js — fallback BACKEND_URL to empty string for same-origin"
    change: "const BACKEND_URL = process.env.REACT_APP_BACKEND_URL || ''"
    output: ["frontend/src/lib/api.js"]

  - id: deploy-worker
    action: "cd worker && npx wrangler deploy"
    pre: "npx wrangler login"
    verification: "curl POST https://ytran-api.*.workers.dev/api/transcript → 200"

  - id: deploy-pages
    action: "connect repo to CF Pages dashboard or: cd frontend && yarn build && npx wrangler pages deploy build --project-name=ytran"
    env: { REACT_APP_BACKEND_URL: "https://ytran-api.SUBDOMAIN.workers.dev" }
    verification: "https://ytran.pages.dev loads, transcript fetch works"

  - id: retire-railway
    action: "shut down Railway project + MongoDB addon"

execution_order: [scaffold-worker, transcript-engine, worker-api, frontend-adapt, deploy-worker, deploy-pages, retire-railway]

risks:
  - { id: r1, risk: "YouTube HTML structure change", likelihood: low, mitigation: "multiple regex fallbacks; same risk as youtube-transcript-api" }
  - { id: r2, risk: "age-restricted videos", likelihood: medium, mitigation: "clear 403; add cookie support later via Worker secrets" }
  - { id: r3, risk: "free tier 100k req/day exceeded", likelihood: low, mitigation: "$5/mo paid = 10M req; add Cache API" }

gotchas:
  - "must send User-Agent header or YouTube returns minimal HTML"
  - "transcript XML has HTML entities — decode &amp; &#39; &quot;"
  - "baseUrl may be protocol-relative — prepend https: if starts with //"
  - "CRA env vars must be REACT_APP_ prefixed"
  - "Worker CORS must whitelist Pages domain"

config_ref:
  placeholders: "worker/wrangler.toml (account_id), frontend .env (REACT_APP_BACKEND_URL)"
  no_secrets_in_code: true
